<title>IDEAL — Rapports élèves</title>
<!-- Garde d'accès : personnel pédagogique connecté -->
<script>
  (function(){
    try {
      var u = JSON.parse(localStorage.getItem('ideal_user') || 'null');
      var ok = u && (u.role === 'directeur' || u.role === 'professeur' || u.role === 'conseiller_vie_scolaire');
      if (!ok) location.replace('/');
    } catch(e) { location.replace('/'); }
  })();

<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700;800&family=Fraunces:wght@600;900&display=swap" rel="stylesheet">

<style>
:root{
  --bg:#f0f5f9; --card:#fff; --dark:#0d2a3b; --blue:#1AAFE0; --blue-d:#0d7fb0;
  --green:#3aa657; --green-bg:#e7f6ec; --amber:#e8850c; --amber-bg:#fdf1e3;
  --red:#e0453a; --red-bg:#fdecea; --muted:#64748b; --border:#dbe6ee; --text:#0d2a3b;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html{background:var(--dark);overscroll-behavior:none}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);
  min-height:100vh;max-width:480px;margin:0 auto;overflow-x:hidden;
  overscroll-behavior-y:none;-webkit-user-select:none;user-select:none;-webkit-touch-callout:none;
  padding-bottom:calc(20px + env(safe-area-inset-bottom))}
input,textarea,select{-webkit-user-select:text;user-select:text;font-family:inherit}

/* En-tête */
.topbar{background:var(--dark);color:#fff;position:sticky;top:0;z-index:100;
  padding:calc(.9rem + env(safe-area-inset-top)) 1.1rem .9rem;
  display:flex;align-items:center;gap:12px}
.topbar .back{width:38px;height:38px;border-radius:50%;border:none;flex-shrink:0;
  background:rgba(255,255,255,.12);color:#fff;font-size:1rem;cursor:pointer;display:none;
  align-items:center;justify-content:center}
.topbar.sub .back{display:flex}
.topbar h1{font-size:1.15rem;font-weight:800;flex:1;line-height:1.1}
.topbar .sub{font-size:.72rem;opacity:.7;font-weight:500}
.portal-back{width:38px;height:38px;border-radius:50%;flex-shrink:0;border:none;cursor:pointer;
  background:rgba(255,255,255,.12);color:#fff;display:flex;align-items:center;justify-content:center;text-decoration:none;font-size:1rem}

/* Recherche */
.search-box{display:flex;align-items:center;gap:9px;background:var(--card);border:1px solid var(--border);
  border-radius:12px;padding:.6rem .85rem;margin:1rem 1.1rem .4rem;box-shadow:0 2px 6px rgba(13,42,59,.05)}
.search-box input{border:none;outline:none;background:none;flex:1;font-size:.95rem;color:var(--text)}
.search-box svg{color:var(--muted);width:18px;height:18px;flex-shrink:0}

/* Liste élèves */
.wrap{padding:0 1.1rem}
.class-group{background:var(--card);border:1px solid var(--border);border-radius:16px;
  margin-bottom:.8rem;overflow:hidden;box-shadow:0 2px 8px rgba(13,42,59,.05)}
.cg-head{width:100%;border:none;background:none;cursor:pointer;display:flex;align-items:center;gap:11px;
  padding:.9rem 1rem;font-family:inherit;border-left:4px solid var(--class-color,var(--blue))}
.cg-dot{width:12px;height:12px;border-radius:4px;background:var(--class-color,var(--blue));flex-shrink:0}
.cg-name{font-weight:800;font-size:1rem;color:var(--dark);flex:1;text-align:left}
.cg-count{background:var(--bg);color:var(--muted);font-weight:700;font-size:.75rem;
  min-width:24px;height:24px;padding:0 7px;border-radius:99px;display:inline-flex;align-items:center;justify-content:center}
.cg-chevron{color:var(--muted);font-size:.8rem;transition:transform .25s}
.class-group.collapsed .cg-chevron{transform:rotate(-90deg)}
.class-group.collapsed .cg-body{display:none}
.st-row{display:flex;align-items:center;gap:12px;padding:.7rem 1rem;border-top:1px solid var(--border);cursor:pointer}
.st-row:active{background:var(--bg)}
.st-av{width:40px;height:40px;border-radius:50%;flex-shrink:0;color:#fff;font-weight:800;font-size:.85rem;
  display:flex;align-items:center;justify-content:center;
  background:linear-gradient(135deg,var(--class-color,var(--blue)),var(--blue-d))}
.st-name{flex:1;min-width:0;font-weight:600;font-size:.96rem;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.st-badge{font-size:.62rem;font-weight:800;padding:.15rem .5rem;border-radius:99px;flex-shrink:0}
.st-badge.done{background:var(--green-bg);color:var(--green)}
.st-badge.todo{background:var(--bg);color:var(--muted)}
.st-go{color:var(--border);font-size:.85rem}

/* Sections écran */
.screen{display:none}
.screen.active{display:block}

/* Éditeur */
.editor{padding:1rem 1.1rem}
.stu-hero{background:linear-gradient(135deg,var(--dark),#12466b);color:#fff;border-radius:16px;
  padding:1.1rem;margin-bottom:1rem;display:flex;align-items:center;gap:12px}
.stu-hero .av{width:52px;height:52px;border-radius:50%;background:rgba(255,255,255,.15);
  display:flex;align-items:center;justify-content:center;font-weight:800;font-size:1.1rem}
.stu-hero .n{font-size:1.15rem;font-weight:800}
.stu-hero .c{font-size:.8rem;opacity:.8}
.field{margin-bottom:1rem}
.field label{display:block;font-size:.82rem;font-weight:700;color:var(--dark);margin-bottom:.4rem}
.field textarea,.field select,.field input{width:100%;border:1px solid var(--border);border-radius:12px;
  padding:.7rem .85rem;font-size:.95rem;color:var(--text);background:var(--card);outline:none}
.field textarea{min-height:80px;resize:vertical;line-height:1.5}
.field textarea:focus,.field select:focus,.field input:focus{border-color:var(--blue)}
.hint{font-size:.72rem;color:var(--muted);margin-top:.3rem}
.grp-title{font-size:.9rem;font-weight:800;color:var(--dark);margin:1.3rem 0 .7rem;
  padding-bottom:.4rem;border-bottom:2px solid var(--border)}
.two{display:grid;grid-template-columns:1fr 1fr;gap:.7rem}
.two .field{margin-bottom:1rem}

/* Compétences */
.comp{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:.7rem .85rem;margin-bottom:.6rem}
.comp-top{display:flex;gap:8px;align-items:center;margin-bottom:.55rem}
.comp-top input{flex:1;border:none;border-bottom:1px solid var(--border);border-radius:0;padding:.3rem 0;font-weight:600}
.comp-top .rm{background:none;border:none;color:var(--red);cursor:pointer;font-size:1rem;padding:4px}
.levels{display:flex;gap:6px}
.lvl{flex:1;border:1.5px solid var(--border);background:var(--card);border-radius:9px;padding:.4rem;
  font-size:.72rem;font-weight:700;color:var(--muted);cursor:pointer;text-align:center}
.lvl.on.acquis{background:var(--green-bg);border-color:var(--green);color:var(--green)}
.lvl.on.encours{background:var(--amber-bg);border-color:var(--amber);color:var(--amber)}
.lvl.on.renforcer{background:var(--red-bg);border-color:var(--red);color:var(--red)}
.add-comp{width:100%;border:1.5px dashed var(--border);background:none;border-radius:12px;padding:.6rem;
  color:var(--blue);font-weight:700;font-size:.85rem;cursor:pointer;margin-bottom:.4rem}

/* Boutons */
.btn{border:none;cursor:pointer;font-family:inherit;font-weight:700;border-radius:13px;
  display:flex;align-items:center;justify-content:center;gap:8px;padding:.9rem;font-size:.92rem}
.btn:active{transform:scale(.97)}
.btn-primary{background:linear-gradient(135deg,var(--blue),var(--blue-d));color:#fff}
.btn-green{background:#25D366;color:#fff}
.btn-ghost{background:var(--card);color:var(--dark);border:1px solid var(--border)}
.btn-row{display:flex;gap:.6rem;margin-top:.4rem}
.btn-row .btn{flex:1}
.sticky-actions{position:sticky;bottom:0;background:linear-gradient(transparent,var(--bg) 22%);
  padding:1rem 0 calc(.4rem + env(safe-area-inset-bottom));margin-top:.5rem}

/* Empty */
.empty{text-align:center;padding:3rem 1.5rem;color:var(--muted)}
.empty svg{width:46px;height:46px;opacity:.3;margin-bottom:1rem}
.empty p{font-weight:700;color:var(--text);font-size:1.05rem;margin-bottom:.3rem}
.empty span{font-size:.85rem}

/* ═══ RAPPORT (aperçu + export PNG) — design premium ═══ */
.report-scroll{background:#c9d6e0;padding:1rem;min-height:100vh}
#report-stage{transform-origin:top left;margin:0 auto}
.report{background:#fff;width:760px;position:relative;box-shadow:0 12px 40px rgba(0,0,0,.2)}
/* Ruban décoratif latéral */
.rep-side{position:absolute;left:0;top:0;bottom:0;width:8px;
  background:linear-gradient(#8DC63F,#00B5B8,#F7941D,#1AAFE0,#EC008C,#ED1C24)}
.rep-head{background:linear-gradient(120deg,#0b2942,#0d4f79 55%,#1591c4);color:#fff;
  padding:26px 30px 22px 38px;position:relative;overflow:hidden}
.rep-head::after{content:'';position:absolute;right:-50px;top:-50px;width:180px;height:180px;
  border-radius:50%;background:rgba(255,255,255,.06)}
.rep-logo{background:#fff;border-radius:12px;padding:8px 12px;display:inline-block;margin-bottom:14px}
.rep-logo img{height:40px;width:auto;display:block}
.rep-title{font-family:'Fraunces',serif;font-size:2rem;font-weight:900;line-height:1;letter-spacing:-.5px}
.rep-school{font-size:.72rem;opacity:.85;letter-spacing:2px;margin-top:6px;text-transform:uppercase}
.rep-period{position:absolute;right:30px;top:26px;background:#F7941D;color:#fff;
  padding:8px 16px;border-radius:99px;font-weight:800;font-size:.82rem;box-shadow:0 4px 14px rgba(0,0,0,.2)}
.rep-body{padding:24px 30px 24px 38px}
.rep-stu{display:grid;grid-template-columns:1fr 1fr;gap:2px;background:var(--border);
  border-radius:14px;overflow:hidden;margin-bottom:22px}
.rep-stu>div{background:#fff;padding:14px 18px}
.rep-stu .lab{font-size:.62rem;color:var(--muted);font-weight:800;text-transform:uppercase;letter-spacing:1px}
.rep-stu .val{font-size:1.15rem;font-weight:800;color:var(--dark);margin-top:2px}
.rep-sec{margin-bottom:18px}
.rep-sec .h{font-size:.72rem;font-weight:800;text-transform:uppercase;letter-spacing:1px;
  margin-bottom:9px;display:flex;align-items:center;gap:8px}
.rep-sec .h .ic{width:24px;height:24px;border-radius:7px;display:flex;align-items:center;
  justify-content:center;font-size:12px;color:#fff}
.rep-card{border-radius:12px;padding:14px 16px;font-size:.95rem;line-height:1.6;
  white-space:pre-wrap;color:#233;border:1px solid var(--border)}
.h.b .ic{background:var(--blue)} .h.g .ic{background:var(--green)}
.h.a .ic{background:var(--amber)} .h.r .ic{background:#12466b}
.h.b{color:var(--blue-d)} .h.g{color:var(--green)} .h.a{color:var(--amber)} .h.r{color:#12466b}
.card-g{background:var(--green-bg);border-color:#bfe6c9}
.card-a{background:var(--amber-bg);border-color:#f6dcb4}
.card-b{background:#eaf6fc;border-color:#c5e6f4}
.rep-comps{display:flex;flex-direction:column;gap:10px}
.rep-comp{display:flex;align-items:center;gap:12px}
.rep-comp .cn{width:150px;font-size:.9rem;font-weight:700;color:var(--dark);flex-shrink:0}
.rep-comp .bar{flex:1;height:9px;border-radius:99px;background:#edf1f4;overflow:hidden}
.rep-comp .bar span{display:block;height:100%;border-radius:99px}
.rep-comp .cl{font-size:.68rem;font-weight:800;padding:.22rem .6rem;border-radius:99px;flex-shrink:0;width:82px;text-align:center}
.bar-acquis{width:100%;background:var(--green)} .cl.acquis{background:var(--green-bg);color:var(--green)}
.bar-encours{width:60%;background:var(--amber)} .cl.encours{background:var(--amber-bg);color:var(--amber)}
.bar-renforcer{width:30%;background:var(--red)} .cl.renforcer{background:var(--red-bg);color:var(--red)}
/* Tuiles de statistiques hebdo */
.rep-tiles{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;margin-bottom:6px}
.rep-tile{border:1px solid var(--border);border-radius:12px;padding:12px 10px;text-align:center;background:#fafcfe}
.rep-tile .tv{font-size:1.5rem;font-weight:900;line-height:1}
.rep-tile .tu{font-size:.6rem;color:var(--muted);font-weight:700}
.rep-tile .tl{font-size:.68rem;color:var(--muted);font-weight:700;margin-top:5px;text-transform:uppercase;letter-spacing:.3px}
.tile-ok .tv{color:var(--green)} .tile-warn .tv{color:var(--amber)} .tile-bad .tv{color:var(--red)}
.rep-badge{display:inline-block;font-size:.8rem;font-weight:800;padding:.35rem .8rem;border-radius:99px}
.rb-g{background:var(--green-bg);color:var(--green)} .rb-a{background:var(--amber-bg);color:var(--amber)}
.rb-r{background:var(--red-bg);color:var(--red)} .rb-n{background:var(--bg);color:var(--muted)}
.rep-note{background:#eaf6fc;border:1px solid #c5e6f4;border-radius:10px;padding:10px 14px;
  font-size:.9rem;color:#12466b;margin-top:8px}
.rep-note strong{font-weight:800}
.win-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.win{border-radius:12px;padding:12px 14px}
.win .wl{font-size:.65rem;font-weight:800;text-transform:uppercase;letter-spacing:.5px;margin-bottom:4px}
.win .wv{font-size:1.05rem;font-weight:800}
.win-top{background:var(--green-bg);border:1px solid #bfe6c9} .win-top .wl,.win-top .wv{color:var(--green)}
.win-low{background:var(--amber-bg);border:1px solid #f6dcb4} .win-low .wl,.win-low .wv{color:var(--amber)}
.rep-foot{border-top:2px solid #eef2f5;margin:0 30px;padding:16px 0 22px 8px;
  display:flex;justify-content:space-between;align-items:flex-end;font-size:.8rem;color:var(--muted)}
.rep-foot .sig{font-weight:800;color:var(--dark);font-size:.9rem}
.rep-foot .stamp{font-family:'Fraunces',serif;font-weight:900;color:#0d4f79;font-size:1.1rem;opacity:.85}

@media print{
  html,body{background:#fff;max-width:none}
  .topbar,.sticky-actions,.no-print{display:none !important}
  .report-scroll{padding:0;background:#fff}
  .report{box-shadow:none;width:100%;max-width:none}
  @page{margin:10mm}
}
</style>
</head>
<body>

<!-- BARRE HAUTE -->
<div class="topbar" id="topbar">
  <a href="/" class="portal-back" id="portal-back" aria-label="Portail">
    <svg width="19" height="19" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.6" stroke-linecap="round" stroke-linejoin="round"><path d="M15 18l-6-6 6-6"/></svg>
  </a>
  <button class="back" id="btn-back" aria-label="Retour">
    <svg width="19" height="19" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.6" stroke-linecap="round" stroke-linejoin="round"><path d="M15 18l-6-6 6-6"/></svg>
  </button>
  <div style="flex:1">
    <h1 id="tb-title">Rapports élèves</h1>
    <div class="sub" id="tb-sub">Rapports hebdomadaires · transmis via IDEAL</div>
  </div>
</div>

<!-- ÉCRAN 1 : LISTE ÉLÈVES -->
<section class="screen active" id="screen-list">
  <div class="search-box">
    <svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="7"/><path d="M21 21l-4-4" stroke-linecap="round"/></svg>
    <input type="text" id="search" placeholder="Rechercher un élève…" oninput="filterList(this.value)">
  </div>
  <div class="wrap" id="students"></div>
</section>

<!-- ÉCRAN 2 : ÉDITEUR DE RAPPORT -->
<section class="screen" id="screen-edit">
  <div class="editor">
    <div class="stu-hero">
      <div class="av" id="ed-av">–</div>
      <div><div class="n" id="ed-name">Élève</div><div class="c" id="ed-class"></div></div>
    </div>

    <div class="field">
      <label>Semaine du</label>
      <input type="date" id="ed-week">
    </div>

    <div class="grp-title">⏱️ Assiduité & ponctualité</div>
    <div class="two">
      <div class="field"><label>Retard le matin (8h) — min</label>
        <input type="number" id="ed-retard-matin" min="0" placeholder="0"></div>
      <div class="field"><label>Retard au départ (16h) — min</label>
        <input type="number" id="ed-retard-soir" min="0" placeholder="0"></div>
    </div>

    <div class="grp-title">📚 Travail & devoirs</div>
    <div class="field">
      <label>Devoirs de maison de la semaine</label>
      <select id="ed-devoirs">
        <option value="tous">✅ Tous traités</option>
        <option value="partiel">🟠 En partie traités</option>
        <option value="non">🔴 Non traités</option>
        <option value="aucun">— Aucun devoir cette semaine</option>
      </select>
    </div>
    <div class="field">
      <label>Devoir de maison à venir</label>
      <input type="text" id="ed-devoir-venir" placeholder="Ex : Lecture p.12 pour lundi (facultatif)">
    </div>

    <div class="grp-title">⚖️ Comportement</div>
    <div class="field">
      <label>Nombre de punitions cette semaine</label>
      <input type="number" id="ed-punitions" min="0" placeholder="0">
    </div>
    <div class="field">
      <label>Incidents survenus</label>
      <textarea id="ed-incidents" placeholder="Décrire les incidents éventuels (laisser vide si aucun)…"></textarea>
    </div>

    <div class="grp-title">🏆 Les victoires de la semaine</div>
    <div class="two">
      <div class="field"><label>Meilleure note</label>
        <input type="text" id="ed-meilleure" placeholder="Ex : 18/20 en Maths"></div>
      <div class="field"><label>Note la plus faible</label>
        <input type="text" id="ed-faible" placeholder="Ex : 9/20 en Dictée"></div>
    </div>

    <div class="grp-title">💬 Bilan de l'enseignant</div>
    <div class="field">
      <label>Appréciation générale</label>
      <textarea id="ed-general" placeholder="Bilan global de la semaine…"></textarea>
    </div>
    <div class="field">
      <label>Conseils pour la maison</label>
      <textarea id="ed-maison" placeholder="Comment les parents peuvent accompagner à la maison…"></textarea>
    </div>

    <div class="sticky-actions">
      <button class="btn btn-primary" onclick="openReport()"><span>Voir le rapport</span></button>
    </div>
  </div>
</section>

<!-- ÉCRAN 3 : APERÇU RAPPORT -->
<section class="screen" id="screen-report">
  <div class="report-scroll">
    <div id="report-stage"><div class="report" id="report"></div></div>
    <div class="sticky-actions no-print" style="max-width:760px;margin:0 auto">
      <button class="btn btn-green" onclick="sendToIdeal()" id="send-btn">📤 Envoyer à IDEAL (image)</button>
      <div class="btn-row">
        <button class="btn btn-ghost" onclick="downloadPng()">⬇️ Enregistrer l'image</button>
        <button class="btn btn-ghost" onclick="window.print()">🖨️ Imprimer</button>
      </div>
      <div class="hint" style="text-align:center;margin-top:.5rem">Le rapport est envoyé au numéro d'IDEAL, qui le transmet ensuite au parent.</div>
    </div>
  </div>
</section>

<script>

const SB_URL='https://jircuneixzwsmtktxrkh.supabase.co';
const SB_KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImppcmN1bmVpeHp3c210a3R4cmtoIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzIxNzI0ODQsImV4cCI6MjA4Nzc0ODQ4NH0.MLAV60tPKhFP8BixVavW3SU-npe8YvS0lKQ493AYNls';

const CLASS_ORDER=['Petite Section','PS','Moyenne Section','MS','Grande Section','GS','CP1','CP2','CE1','CE2','CM1','CM2'];
const CLASS_COLORS=['#8DC63F','#00B5B8','#F7941D','#1AAFE0','#EC008C','#ED1C24','#7E57C2','#00897B','#5C6BC0','#26A69A','#66BB6A','#EF5350'];
const classRank=g=>{const i=CLASS_ORDER.findIndex(c=>c.toLowerCase()===String(g||'').toLowerCase());return i===-1?99:i;};
const initials=n=>(n||'?').split(/\s+/).map(w=>w[0]).slice(0,2).join('').toUpperCase();
const esc=s=>String(s==null?'':s).replace(/[&<>]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[c]));

let STUDENTS=[];       // {key,name,classe,whatsapp}
let REPORTS={};        // key -> report object
let _filter='';
let CURRENT=null;      // élève en cours d'édition
let user=null;
try{user=JSON.parse(localStorage.getItem('ideal_user')||'null');}catch(e){}

// ══════════════════ CHARGEMENT DES DONNÉES ══════════════════
async function loadAll(){
  // Périmètre de classes selon le rôle
  let allowIds=null, allowNames=null;
  if(user && user.role==='professeur' && user.id){
    allowIds=new Set(); allowNames=new Set();
    try{
      const r=await fetch(SB_URL+'/rest/v1/prof_classes?user_id=eq.'+encodeURIComponent(user.id)+'&select=classe_id,classes(id,nom)',{headers:H});
      if(r.ok)(await r.json()).forEach(row=>{
        if(row.classe_id!=null)allowIds.add(String(row.classe_id));
        if(row.classes&&row.classes.nom)allowNames.add(row.classes.nom.toLowerCase());
      });
    }catch(e){}
  }
  const inScope=(id,nom)=>{
    if(!allowIds)return true;
    if(id!=null&&allowIds.has(String(id)))return true;
    if(nom&&allowNames.has(String(nom).toLowerCase()))return true;
    return false;
  };

  const list=[], seen=new Set();
  const add=(name,classe,key,wa)=>{
    if(!name)return;const d=name.toLowerCase()+'|'+(classe||'').toLowerCase();
    if(seen.has(d))return;seen.add(d);
    list.push({key,name,classe:classe||'Sans classe',whatsapp:wa||null});
  };

  // Élèves table centrale
  try{
    const er=await fetch(SB_URL+'/rest/v1/eleves?actif=eq.true&select=id,prenom,nom,classe_id,classes(nom)',{headers:H});
    if(er.ok)(await er.json()).forEach(e=>{
      const cn=(e.classes&&e.classes.nom)||'';
      if(inScope(e.classe_id,cn))add(((e.prenom||'')+' '+(e.nom||'')).trim(),cn,'el:'+e.id,null);
    });
  }catch(e){}

  // Inscriptions (+ whatsapp du responsable)
  try{
    const ir=await fetch(SB_URL+'/rest/v1/inscriptions?select=matricule,prenom,nom,classe_demandee,responsable1_id',{headers:H});
    if(ir.ok){
      const ins=await ir.json();
      const ids=[...new Set(ins.map(i=>i.responsable1_id).filter(Boolean))];
      const waMap={};
      if(ids.length){
        try{
          const rr=await fetch(SB_URL+'/rest/v1/responsables?id=in.('+ids.join(',')+')&select=id,whatsapp,tel1',{headers:H});
          if(rr.ok)(await rr.json()).forEach(r=>waMap[r.id]=r.whatsapp||r.tel1||null);
        }catch(e){}
      }
      ins.forEach(e=>{
        if(inScope(null,e.classe_demandee))
          add(((e.prenom||'')+' '+(e.nom||'')).trim(),e.classe_demandee||'','ins:'+e.matricule,waMap[e.responsable1_id]);
      });
    }
  }catch(e){}

  STUDENTS=list;

  // Rapports déjà enregistrés (app_state app='rapports_eleves')
  try{
    const r=await fetch(SB_URL+'/rest/v1/app_state?app=eq.rapports_eleves&select=key,value',{headers:H});
    if(r.ok)(await r.json()).forEach(({key,value})=>{REPORTS[key]=value;});
  }catch(e){}

  renderList();
}

// ══════════════════ LISTE ÉLÈVES ══════════════════
function filterList(q){_filter=(q||'').toLowerCase().trim();renderList();}

function renderList(){
  const wrap=document.getElementById('students');
  if(!STUDENTS.length){
    wrap.innerHTML=`<div class="empty"><svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.6"><path d="M12 14a4 4 0 100-8 4 4 0 000 8zM4 20a8 8 0 0116 0"/></svg>
      <p>Aucun élève</p><span>Les élèves de vos classes apparaîtront ici.</span></div>`;
    return;
  }
  const groups={};
  STUDENTS.forEach(s=>{(groups[s.classe]=groups[s.classe]||[]).push(s);});
  const order=Object.keys(groups).sort((a,b)=>classRank(a)-classRank(b)||a.localeCompare(b));
  let html='',any=false;
  order.forEach(g=>{
    let arr=groups[g].sort((a,b)=>a.name.localeCompare(b.name));
    if(_filter)arr=arr.filter(s=>s.name.toLowerCase().includes(_filter));
    if(!arr.length)return;any=true;
    const color=CLASS_COLORS[classRank(g)%CLASS_COLORS.length];
    const collapsed=_filter?false:(localStorage.getItem('rep_col_'+g)==='1');
    html+=`<div class="class-group${collapsed?' collapsed':''}" style="--class-color:${color}">
      <button class="cg-head" onclick="toggleGroup(this,'${esc(g).replace(/'/g,"")}')">
        <span class="cg-dot"></span><span class="cg-name">${esc(g)}</span>
        <span class="cg-count">${arr.length}</span>
        <svg class="cg-chevron" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><path d="M6 9l6 6 6-6"/></svg>
      </button><div class="cg-body">`;
    arr.forEach(s=>{
      const done=!!REPORTS[s.key];
      html+=`<div class="st-row" onclick="openEditor('${s.key}')">
        <div class="st-av">${initials(s.name)}</div>
        <div class="st-name">${esc(s.name)}</div>
        <span class="st-badge ${done?'done':'todo'}">${done?'✓ Rapport':'À faire'}</span>
        <svg class="st-go" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><path d="M9 6l6 6-6 6"/></svg>
      </div>`;
    });
    html+=`</div></div>`;
  });
  wrap.innerHTML=any?html:`<div class="empty"><p>Aucun résultat</p><span>pour « ${esc(_filter)} »</span></div>`;
}
function toggleGroup(btn,g){
  const grp=btn.parentElement;const now=!grp.classList.contains('collapsed');
  grp.classList.toggle('collapsed',now);localStorage.setItem('rep_col_'+g,now?'1':'0');
}

// ══════════════════ NAVIGATION ══════════════════
function showScreen(id,title,sub){
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
  const tb=document.getElementById('topbar');
  document.getElementById('tb-title').textContent=title;
  document.getElementById('tb-sub').textContent=sub||'';
  if(id==='screen-list'){tb.classList.remove('sub');document.getElementById('portal-back').style.display='flex';}
  else{tb.classList.add('sub');document.getElementById('portal-back').style.display='none';}
  window.scrollTo(0,0);
}
document.getElementById('btn-back').onclick=()=>{
  if(document.getElementById('screen-report').classList.contains('active')){openEditor(CURRENT.key);}
  else{showScreen('screen-list','Rapports élèves','Rapports hebdomadaires · transmis via IDEAL');renderList();}
};

// ══════════════════ ÉDITEUR ══════════════════
function frWeek(iso){
  if(!iso)return new Date().toLocaleDateString('fr-FR');
  return new Date(iso+'T00:00:00').toLocaleDateString('fr-FR',{day:'numeric',month:'long',year:'numeric'});
}
function openEditor(key){
  CURRENT=STUDENTS.find(s=>s.key===key);
  if(!CURRENT)return;
  document.getElementById('ed-av').textContent=initials(CURRENT.name);
  document.getElementById('ed-name').textContent=CURRENT.name;
  document.getElementById('ed-class').textContent=CURRENT.classe;
  const r=REPORTS[key]||{};
  const g=(id,v)=>{const el=document.getElementById(id);if(el)el.value=v;};
  g('ed-week', r.week || new Date().toISOString().slice(0,10));
  g('ed-retard-matin', r.retardMatin!=null?r.retardMatin:'');
  g('ed-retard-soir', r.retardSoir!=null?r.retardSoir:'');
  g('ed-devoirs', r.devoirs||'tous');
  g('ed-devoir-venir', r.devoirVenir||'');
  g('ed-punitions', r.punitions!=null?r.punitions:'');
  g('ed-incidents', r.incidents||'');
  g('ed-meilleure', r.meilleure||'');
  g('ed-faible', r.faible||'');
  g('ed-general', r.general||'');
  g('ed-maison', r.maison||'');
  showScreen('screen-edit','Rapport hebdomadaire',CURRENT.name);
}

function collectReport(){
  const v=id=>{const el=document.getElementById(id);return el?el.value.trim():'';};
  const num=id=>{const x=parseInt(v(id),10);return isNaN(x)?0:x;};
  return {
    studentName:CURRENT.name, classe:CURRENT.classe,
    week:v('ed-week'),
    retardMatin:num('ed-retard-matin'), retardSoir:num('ed-retard-soir'),
    devoirs:v('ed-devoirs'), devoirVenir:v('ed-devoir-venir'),
    punitions:num('ed-punitions'), incidents:v('ed-incidents'),
    meilleure:v('ed-meilleure'), faible:v('ed-faible'),
    general:v('ed-general'), maison:v('ed-maison'),
    teacher:[user&&user.prenom,user&&user.nom].filter(Boolean).join(' '),
    date:new Date().toLocaleDateString('fr-FR')
  };
}

// ══════════════════ RAPPORT (aperçu) ══════════════════
const DEVOIRS_BADGE={
  tous:['rb-g','Tous les devoirs traités'], partiel:['rb-a','Devoirs en partie traités'],
  non:['rb-r','Devoirs non traités'], aucun:['rb-n','Aucun devoir cette semaine']
};
function openReport(){
  const r=collectReport();
  REPORTS[CURRENT.key]=r;
  saveReport(CURRENT.key,r);
  renderReport(r);
  showScreen('screen-report','Rapport · '+CURRENT.name.split(' ')[0],'');
  setTimeout(fitReport,60);
}
// Ajuste l'aperçu (760px) pour tenir dans la largeur de l'écran
function fitReport(){
  const stage=document.getElementById('report-stage');
  const rep=document.getElementById('report');
  if(!stage||!rep)return;
  stage.style.transform='none';
  const avail=Math.min(document.querySelector('.report-scroll').clientWidth-16, 760);
  const scale=Math.min(1, avail/760);
  stage.style.transform='scale('+scale+')';
  stage.style.height=(rep.offsetHeight*scale)+'px';
  stage.style.width='760px';
}
window.addEventListener('resize',()=>{if(document.getElementById('screen-report').classList.contains('active'))fitReport();});
function renderReport(r){
  const tile=(val,unit,label)=>{
    const cls=val===0?'tile-ok':(val<=10?'tile-warn':'tile-bad');
    return `<div class="rep-tile ${cls}"><div class="tv">${val}<span class="tu"> ${unit}</span></div><div class="tl">${label}</div></div>`;
  };
  const punCls=r.punitions===0?'tile-ok':(r.punitions<=1?'tile-warn':'tile-bad');
  const db=DEVOIRS_BADGE[r.devoirs]||DEVOIRS_BADGE.tous;
  const sec=(cls,icon,title,inner)=>`<div class="rep-sec"><div class="h ${cls}"><span class="ic">${icon}</span>${title}</div>${inner}</div>`;
  const card=(cls,txt)=>`<div class="rep-card card-${cls}">${esc(txt)}</div>`;

  const wins=(r.meilleure||r.faible)?`<div class="win-grid">
      ${r.meilleure?`<div class="win win-top"><div class="wl">🏅 Meilleure note</div><div class="wv">${esc(r.meilleure)}</div></div>`:''}
      ${r.faible?`<div class="win win-low"><div class="wl">📉 Note la plus faible</div><div class="wv">${esc(r.faible)}</div></div>`:''}
    </div>`:'<div class="rep-card">Notes non renseignées cette semaine.</div>';

  document.getElementById('report').innerHTML=`
    <div class="rep-side"></div>
    <div class="rep-head">
      <div class="rep-period">Semaine du ${esc(frWeek(r.week))}</div>
      <div class="rep-logo"><img src="/logo-ideal.png" onerror="this.parentElement.style.display='none'"></div>
      <div class="rep-title">Rapport hebdomadaire</div>
      <div class="rep-school">École Internationale Bilingue IDEAL · Bamako</div>
    </div>
    <div class="rep-body">
      <div class="rep-stu">
        <div><div class="lab">Élève</div><div class="val">${esc(r.studentName)}</div></div>
        <div><div class="lab">Classe</div><div class="val">${esc(r.classe)}</div></div>
      </div>

      ${sec('b','⏱️','Assiduité & ponctualité',`<div class="rep-tiles">
        ${tile(r.retardMatin,'min','Retard matin (8h)')}
        ${tile(r.retardSoir,'min','Retard départ (16h)')}
        <div class="rep-tile ${punCls}"><div class="tv">${r.punitions}</div><div class="tl">Punitions</div></div>
      </div>`)}

      ${sec('g','📚','Travail & devoirs',`
        <div><span class="rep-badge ${db[0]}">${db[1]}</span></div>
        ${r.devoirVenir?`<div class="rep-note"><strong>📌 Devoir à venir :</strong> ${esc(r.devoirVenir)}</div>`:''}`)}

      ${sec('a','⚖️','Comportement',
        r.incidents?card('a',r.incidents):`<div class="rep-card card-g">Aucun incident signalé cette semaine. 👍</div>`)}

      ${sec('r','🏆','Les victoires de la semaine',wins)}

      ${r.general?sec('b','💬','Appréciation de l\'enseignant',card('b',r.general)):''}
      ${r.maison?sec('r','🏠','Conseils pour la maison',card('r',r.maison)):''}
    </div>
    <div class="rep-foot">
      <div><div style="font-size:.66rem;text-transform:uppercase;letter-spacing:1px">Enseignant</div>
        <div class="sig">${esc(r.teacher||'—')}</div><div>Édité le ${esc(r.date)}</div></div>
      <div class="stamp">IDEAL</div>
    </div>`;
}

// ══════════════════ SAUVEGARDE SUPABASE ══════════════════
function saveReport(key,r){
  fetch(SB_URL+'/rest/v1/app_state',{method:'POST',
    headers:{...H,Prefer:'resolution=merge-duplicates'},
    body:JSON.stringify({app:'rapports_eleves',key,value:r,updated_at:new Date().toISOString()})
  }).catch(()=>{});
}

// ══════════════════ EXPORT PNG ══════════════════
// Numéro WhatsApp officiel d'IDEAL (destinataire des rapports)
const IDEAL_WA='22390190007';
function getIdealNumber(){ return IDEAL_WA; }
async function reportToBlob(){
  const el=document.getElementById('report');
  const stage=document.getElementById('report-stage');
  const prev=stage?stage.style.transform:'';
  if(stage){stage.style.transform='none';stage.style.height='auto';}
  // s'assurer que le logo ET les polices sont chargés avant la capture (netteté)
  const img=el.querySelector('.rep-logo img');
  if(img && !img.complete){ await new Promise(r=>{img.onload=img.onerror=r;}); }
  if(document.fonts && document.fonts.ready){ try{ await document.fonts.ready; }catch(e){} }
  const dpr=Math.max(3, window.devicePixelRatio||1);
  const canvas=await html2canvas(el,{scale:dpr,backgroundColor:'#ffffff',useCORS:true,logging:false,
    width:760,windowWidth:760,imageTimeout:0});
  if(stage){stage.style.transform=prev;fitReport();}
  return new Promise(res=>canvas.toBlob(res,'image/png',0.95));
}
function reportFileName(){
  const r=REPORTS[CURRENT.key];
  return 'Rapport_'+(r.studentName||'eleve').replace(/\s+/g,'_')+'_'+(r.period||'').replace(/\s+/g,'')+'.png';
}
async function downloadPng(){
  const btn=event&&event.target;if(btn)btn.textContent='⏳ Génération…';
  try{
    const blob=await reportToBlob();
    const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download=reportFileName();a.click();
    setTimeout(()=>URL.revokeObjectURL(a.href),3000);
  }catch(e){alert('Erreur lors de la génération de l\'image.');}
  if(btn)btn.textContent='⬇️ Enregistrer l\'image';
}
async function sendToIdeal(){
  const btn=document.getElementById('send-btn');
  btn.textContent='⏳ Génération de l\'image…';
  let blob;
  try{ blob=await reportToBlob(); }
  catch(e){ btn.textContent='📤 Envoyer à IDEAL (image)'; return alert('Erreur lors de la génération.'); }
  const r=REPORTS[CURRENT.key];
  const file=new File([blob],reportFileName(),{type:'image/png'});
  const legende=`École IDEAL — Rapport de suivi de ${r.studentName} (${r.classe}, ${r.period}). À transmettre au parent.`;
  btn.textContent='📤 Envoyer à IDEAL (image)';

  // 1) Partage natif avec le fichier image (mobile) → choisir le contact IDEAL
  if(navigator.canShare && navigator.canShare({files:[file]})){
    try{ await navigator.share({files:[file],text:legende}); return; }catch(e){ if(e.name==='AbortError')return; }
  }
  // 2) Repli : télécharger l'image + ouvrir WhatsApp sur le numéro d'IDEAL
  const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download=reportFileName();a.click();
  setTimeout(()=>URL.revokeObjectURL(a.href),3000);
  const num=getIdealNumber();
  const url=(num?`https://wa.me/${num}`:'https://wa.me/')+`?text=${encodeURIComponent(legende+'\n(joindre l\'image téléchargée)')}`;
  setTimeout(()=>window.open(url,'_blank'),600);
}

// ══════════════════ INIT ══════════════════
loadAll();
</script>
